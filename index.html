<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repositorio de la ecología de la Región de Antofagasta</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #0f1520;
    --bg-panel: #162032;
    --accent: #c7453b;
    --accent-warm: #d4715a;
    --accent-gold: #d4a853;
    --text-light: #eaeaea;
    --text-muted: #8a94a8;
    --glass: rgba(15, 21, 32, 0.92);
    --glass-light: rgba(22, 32, 50, 0.88);
    --border: rgba(199, 69, 59, 0.25);
    --border-subtle: rgba(255,255,255,0.08);
  }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg-dark);
    color: var(--text-light);
    height: 100vh;
    overflow: hidden;
  }

  /* ══ MAP ══ */
  #map {
    width: 100%;
    height: 100vh;
    z-index: 1;
  }

  /* ══ HEADER ══ */
  .header-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-logo {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    object-fit: contain;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    padding: 2px;
  }

  .header-text h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-light);
    line-height: 1.3;
  }

  .header-text .subtitle {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin-top: 1px;
  }

  /* ══ SIDE PANEL ══ */
  .side-panel {
    position: fixed;
    top: 80px; left: 14px;
    z-index: 1000;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 18px;
    width: 240px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
  }

  .side-panel h2 {
    font-family: 'Libre Baskerville', serif;
    font-size: 0.85rem;
    margin-bottom: 14px;
    color: var(--accent-gold);
    letter-spacing: 0.03em;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 9px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .legend-line {
    width: 22px; height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .legend-circle {
    width: 13px; height: 13px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid #fff;
  }

  .side-panel .info-text {
    font-size: 0.72rem;
    color: var(--text-muted);
    line-height: 1.55;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border-subtle);
  }

  .toggle-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 7px;
    background: none;
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text-muted);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Source Sans 3', sans-serif;
    width: 100%;
  }
  .toggle-btn:hover { background: rgba(199,69,59,0.08); color: var(--text-light); }
  .toggle-btn .check {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1.5px solid var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    transition: all 0.2s;
  }
  .toggle-btn.active .check {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ══ LOADING ══ */
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg-dark);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border-subtle);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    margin-top: 14px;
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  /* ══ POPUP STYLES ══ */
  .leaflet-popup-content-wrapper {
    background: var(--glass) !important;
    backdrop-filter: blur(20px) !important;
    -webkit-backdrop-filter: blur(20px) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    color: var(--text-light) !important;
    box-shadow: 0 10px 40px rgba(0,0,0,0.55) !important;
    padding: 0 !important;
    overflow: hidden;
  }

  .leaflet-popup-tip { background: var(--glass) !important; }
  .leaflet-popup-close-button {
    color: var(--text-muted) !important;
    font-size: 20px !important;
    top: 6px !important;
    right: 10px !important;
    z-index: 10;
  }

  .leaflet-popup-content {
    margin: 0 !important;
    width: 310px !important;
    max-width: 310px !important;
  }

  .popup-inner { font-family: 'Source Sans 3', sans-serif; }

  .popup-inner .gallery {
    position: relative;
    width: 310px;
    height: 210px;
    overflow: hidden;
    background: #0a0e16;
  }

  .popup-inner .gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  .popup-inner .gallery img.active {
    display: block;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .gallery-nav {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 5;
  }
  .gallery-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .gallery-dot.active { background: var(--accent-gold); transform: scale(1.3); }

  .gallery-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
    transition: background 0.2s;
  }
  .gallery-arrow:hover { background: rgba(0,0,0,0.85); }
  .gallery-arrow.left { left: 7px; }
  .gallery-arrow.right { right: 7px; }

  .gallery-counter {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 10px;
    z-index: 5;
  }

  .popup-body { padding: 12px 14px 14px; }
  .popup-body h3 {
    font-family: 'Libre Baskerville', serif;
    font-size: 0.95rem;
    margin-bottom: 3px;
    color: var(--text-light);
  }
  .popup-body .station-id {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .popup-caption {
    text-align: center;
    padding: 5px 12px;
    font-size: 0.7rem;
    color: var(--text-muted);
    font-style: italic;
    background: rgba(0,0,0,0.2);
  }

  .no-photos {
    width: 310px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.3);
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  /* ══ LEAFLET CONTROLS ══ */
  .leaflet-control-attribution {
    background: var(--glass) !important;
    color: var(--text-muted) !important;
    font-size: 0.6rem !important;
    backdrop-filter: blur(8px) !important;
  }
  .leaflet-control-attribution a { color: var(--accent-warm) !important; }

  .leaflet-control-scale-line {
    background: var(--glass) !important;
    color: var(--text-light) !important;
    border-color: var(--accent) !important;
    backdrop-filter: blur(8px) !important;
    font-size: 0.65rem !important;
  }

  .leaflet-control-zoom a {
    background: var(--glass) !important;
    color: var(--text-light) !important;
    border-color: var(--border-subtle) !important;
    backdrop-filter: blur(8px) !important;
  }
  .leaflet-control-zoom a:hover {
    background: var(--bg-panel) !important;
    color: var(--accent) !important;
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Cargando mapa...</div>
</div>

<!-- Header -->
<div class="header-bar">
  <!--
    ═══════════════════════════════════════════════════════════
    LOGO: Coloca tu archivo Logo_fyf.jpg en la misma carpeta
    que este HTML, o ajusta la ruta abajo.
    ═══════════════════════════════════════════════════════════
  -->
  <img src="Logo_fyf.jpg" alt="Logo" class="header-logo" onerror="this.style.display='none'">
  <div class="header-text">
    <h1>Repositorio de la ecología de la Región de Antofagasta</h1>
    <div class="subtitle">Flora, Fauna y Patrimonio Natural</div>
  </div>
</div>

<!-- Side panel -->
<div class="side-panel">
  <h2>Capas</h2>

  <div class="legend-item">
    <div class="legend-line" style="background: #c7453b;"></div>
    <span>Región de Antofagasta</span>
  </div>
  <div class="legend-item">
    <div class="legend-circle" style="background: #d4a853;"></div>
    <span>Caspana — puntos de muestreo</span>
  </div>

  <button class="toggle-btn active" onclick="toggleLayer('antofagasta')" id="btn-antofagasta">
    <span class="check">✓</span> Región de Antofagasta
  </button>
  <button class="toggle-btn active" onclick="toggleLayer('caspana')" id="btn-caspana">
    <span class="check">✓</span> Caspana
  </button>

  <div class="info-text">
    Haz clic en un punto de Caspana para ver la galería de fotografías asociada.
  </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ══════════════════════════════════════════════════════════════
// MAPA BASE
// ══════════════════════════════════════════════════════════════

const map = L.map('map', {
  center: [-23.65, -68.5],     // Centro aproximado de Antofagasta
  zoom: 8,
  zoomControl: true
});

// Mapa satelital Esri (gratuito)
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles &copy; Esri — Maxar, Earthstar Geographics',
  maxZoom: 19
}).addTo(map);

// Etiquetas sobre el satélite
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Reference_Overlay/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  opacity: 0.8
}).addTo(map);

L.control.scale({ imperial: false, position: 'bottomright' }).addTo(map);


// ══════════════════════════════════════════════════════════════
// CONFIGURACIÓN DE FOTOS POR PUNTO
// ══════════════════════════════════════════════════════════════
//
// Aquí defines las fotos para cada punto de caspana.geojson.
// La clave debe coincidir con el valor de la columna "Name"
// en tu GeoJSON.
//
// Las URLs pueden ser:
//   - Rutas locales relativas: "fotos/CT001_01.jpg"
//   - Google Drive:  ver guía más abajo
//   - GitHub raw:    "https://raw.githubusercontent.com/usuario/repo/main/img/foto.jpg"
//
// ══════════════════════════════════════════════════════════════

const photoData = {

  // ── EJEMPLO: Punto llamado "Caspana" ──
  "Caspana": {
    photos: [
      // Reemplaza estas URLs con tus fotos reales:
      "fotos/caspana_01.JPG",
      "fotos/caspana_02.JPG",
      "fotos/caspana_03.JPG",
      "fotos/caspana_04.JPG",
      "fotos/caspana_05.JPG",
      "fotos/caspana_06.JPG"
    ],
    captions: [
      "Gato del Desierto (Leopardus garleppi)",
      "Gato Andino (Leopardus jacobita)",
      "Puma (Puma concolor)",
      "Puma (Puma concolor)",
      "Gato Andino (Leopardus jacobita)",
      "Gato del Desierto (Leopardus garleppi)",
    ]
  }

  // ── Para agregar más puntos, copia el bloque: ──
  //
  // , "Nombre del punto": {
  //     photos: [
  //       "fotos/nombre_01.jpg",
  //       "fotos/nombre_02.jpg"
  //     ],
  //     captions: [
  //       "Descripción foto 1",
  //       "Descripción foto 2"
  //     ]
  //   }

};


// ══════════════════════════════════════════════════════════════
// CARGAR CAPAS GEOJSON
// ══════════════════════════════════════════════════════════════

let antofagastaLayer = null;
let caspanaLayer = null;

const layers = {};

// ── Capa 1: antofagasta.geojson — contorno rojo ──
fetch('antofagasta.geojson')
  .then(r => r.json())
  .then(data => {
    antofagastaLayer = L.geoJSON(data, {
      style: {
        color: '#c7453b',
        weight: 2.5,
        fillColor: 'transparent',
        fillOpacity: 0,
        dashArray: null
      }
    }).addTo(map);

    layers.antofagasta = { layer: antofagastaLayer, visible: true };

    // Ajustar vista al contorno de Antofagasta
    map.fitBounds(antofagastaLayer.getBounds(), { padding: [50, 50] });
  })
  .catch(err => {
    console.warn('No se pudo cargar antofagasta.geojson:', err);
    console.info('Asegúrate de que el archivo esté en la misma carpeta y uses Live Server.');
  });


// ── Capa 2: caspana.geojson — puntos con galería ──
fetch('caspana.geojson')
  .then(r => r.json())
  .then(data => {
    caspanaLayer = L.geoJSON(data, {
      // Solo mostrar features donde Name == "Caspana"
      filter: function(feature) {
        return feature.properties.Name === "Caspana";
      },
      pointToLayer: function(feature, latlng) {
        return L.circleMarker(latlng, {
          radius: 8,
          fillColor: '#d4a853',
          color: '#ffffff',
          weight: 2,
          fillOpacity: 0.9
        });
      },
      onEachFeature: function(feature, layer) {
        const name = feature.properties.Name || "Sin nombre";
        const data = photoData[name];

        let popupHtml = '<div class="popup-inner">';

        if (data && data.photos && data.photos.length > 0) {
          const gid = 'g-' + Math.random().toString(36).substr(2, 6);

          // Gallery
          popupHtml += `<div class="gallery" id="${gid}">`;
          popupHtml += `<div class="gallery-counter"><span class="gc-current">1</span> / ${data.photos.length}</div>`;

          data.photos.forEach((url, i) => {
            popupHtml += `<img src="${url}" alt="${data.captions?.[i] || ''}" class="${i === 0 ? 'active' : ''}" data-index="${i}" />`;
          });

          if (data.photos.length > 1) {
            popupHtml += `<button class="gallery-arrow left" onclick="changeSlide('${gid}', -1)">&#8249;</button>`;
            popupHtml += `<button class="gallery-arrow right" onclick="changeSlide('${gid}', 1)">&#8250;</button>`;
            popupHtml += `<div class="gallery-nav">`;
            data.photos.forEach((_, i) => {
              popupHtml += `<button class="gallery-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide('${gid}', ${i})"></button>`;
            });
            popupHtml += `</div>`;
          }

          popupHtml += `</div>`; // close gallery
          popupHtml += `<div class="popup-caption" id="cap-${gid}">${data.captions?.[0] || ''}</div>`;
        } else {
          popupHtml += `<div class="no-photos">Sin fotografías disponibles</div>`;
        }

        // Info
        popupHtml += `<div class="popup-body">`;
        popupHtml += `<h3>${name}</h3>`;

        // Mostrar todas las propiedades del GeoJSON (excepto Name)
        const props = feature.properties;
        const skipKeys = ['Name', 'name'];
        const entries = Object.entries(props).filter(([k]) => !skipKeys.includes(k));
        if (entries.length > 0) {
          popupHtml += `<div class="station-id">`;
          entries.forEach(([key, val]) => {
            if (val !== null && val !== '') {
              popupHtml += `${key}: ${val}<br>`;
            }
          });
          popupHtml += `</div>`;
        }

        popupHtml += `</div></div>`;

        layer.bindPopup(popupHtml, { maxWidth: 330, minWidth: 310 });
      }
    }).addTo(map);

    layers.caspana = { layer: caspanaLayer, visible: true };
  })
  .catch(err => {
    console.warn('No se pudo cargar caspana.geojson:', err);
    console.info('Asegúrate de que el archivo esté en la misma carpeta y uses Live Server.');
  });


// ══════════════════════════════════════════════════════════════
// GALERÍA: FUNCIONES DE NAVEGACIÓN
// ══════════════════════════════════════════════════════════════

function goToSlide(galleryId, index) {
  const gallery = document.getElementById(galleryId);
  if (!gallery) return;

  const imgs = gallery.querySelectorAll('img');
  const dots = gallery.querySelectorAll('.gallery-dot');
  const counter = gallery.querySelector('.gc-current');

  imgs.forEach(img => img.classList.remove('active'));
  dots.forEach(dot => dot.classList.remove('active'));

  imgs[index].classList.add('active');
  if (dots[index]) dots[index].classList.add('active');
  if (counter) counter.textContent = index + 1;

  // Actualizar caption
  const captionEl = document.getElementById('cap-' + galleryId);
  if (captionEl) captionEl.textContent = imgs[index].alt || '';
}

function changeSlide(galleryId, direction) {
  const gallery = document.getElementById(galleryId);
  if (!gallery) return;

  const imgs = gallery.querySelectorAll('img');
  let current = 0;
  imgs.forEach((img, i) => { if (img.classList.contains('active')) current = i; });

  let next = current + direction;
  if (next < 0) next = imgs.length - 1;
  if (next >= imgs.length) next = 0;

  goToSlide(galleryId, next);
}


// ══════════════════════════════════════════════════════════════
// TOGGLE DE CAPAS
// ══════════════════════════════════════════════════════════════

function toggleLayer(name) {
  const l = layers[name];
  if (!l) return;

  const btn = document.getElementById(`btn-${name}`);

  if (l.visible) {
    map.removeLayer(l.layer);
    l.visible = false;
    btn.classList.remove('active');
  } else {
    map.addLayer(l.layer);
    l.visible = true;
    btn.classList.add('active');
  }
}


// ══════════════════════════════════════════════════════════════
// OCULTAR LOADING
// ══════════════════════════════════════════════════════════════

window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 800);
});

</script>
</body>
</html>
